<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI语音学习助手</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="main-container">
    <div class="content-wrapper">
      
      <div id="welcome-section" class="welcome-section">
        <h1 class="welcome-title">AI汇报答疑助手</h1>
        <p class="welcome-subtitle">我可以帮你就汇报中的问题进行回答</p>
      </div>

      <div id="chat-section" class="chat-section d-none">
        <div id="chat-box" class="chat-box"></div>
      </div>

      <div class="input-section">
        <div class="chat-input-wrapper">
          <textarea 
            id="text-input" 
            class="chat-input form-control" 
            placeholder="请输入你的问题，或点击麦克风语音提问..." 
            rows="3"
          ></textarea>
          
          <div class="input-toolbar">
            <div class="toolbar-right">
              <button id="btn-record" class="btn-icon mic-btn" title="语音输入">
                <i class="fas fa-microphone"></i>
              </button>
              <button id="btn-send" class="btn-icon send-btn" title="发送">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="status-bar" class="status-bar">点击麦克风开始说话</div>
      
      <button id="btn-stop" class="btn btn-danger btn-stop-recording d-none" title="停止录音">
        <i class="fas fa-stop"></i> 停止录音
      </button>
      
      <button id="btn-pause-speech" class="btn btn-warning btn-pause-speech d-none" title="暂停朗读">
        <i class="fas fa-pause"></i>
      </button>
      
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/websocket.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
